<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry 😢</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f8cdd1;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        position: relative;
    }

    .card {
        background: white;
        padding: 5vw;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 90%;
        max-width: 400px;
        z-index: 1;
    }

    video {
        width: 100%;
        max-width: 220px;
        border-radius: 10px;
        margin-bottom: 15px;
    }

    h2 {
        font-size: 6vw;
        max-font-size: 24px;
    }

    p {
        font-size: 4vw;
        max-font-size: 16px;
    }

    .buttons {
        margin-top: 20px;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 20px;
        font-size: 4vw;
        max-font-size: 16px;
        cursor: pointer;
        margin: 8px;
    }

    .yes {
        background: #28a745;
        color: white;
    }

    .no {
        background: #dc3545;
        color: white;
    }

    .floating-yes {
        position: absolute;
        background: #28a745;
        color: white;
        border-radius: 20px;
        padding: 6px 12px;
        font-size: 12px;
        z-index: 9999;
        white-space: nowrap;
    }
</style>
</head>

<body>

<div class="card">

    <video id="sorryVideo" loop>
        <source src="sorry.mp4" type="video/mp4">
    </video>

    <h2>I'm Sorry! 😢</h2>
    <p>I know I messed up... Can you please give me a chance?</p>

    <div class="buttons">
        <button class="yes" onclick="forgive()">Yes</button>
        <button class="no" onclick="spawnYes()">No</button>
    </div>
</div>

<script>
let videoStarted = false;
let noClicks = 0;

function playVideoWithSound() {
    const video = document.getElementById("sorryVideo");
    if (!videoStarted) {
        video.muted = false;
        video.play();
        videoStarted = true;
    }
}

function forgive() {
    playVideoWithSound();
    document.body.innerHTML = "<h1 style='color:white; text-align:center;'>Yay! ❤️ Thank you!!</h1>";
}

function spawnYes() {
    playVideoWithSound();

    noClicks++;

    // 🔥 Exponential growth
    let count = Math.pow(3, noClicks); 

    // cap so browser doesn't crash
    count = Math.min(count, 200);

    for (let i = 0; i < count; i++) {
        let btn = document.createElement("button");
        btn.innerText = "Yes";
        btn.className = "floating-yes";

        btn.style.left = Math.random() * window.innerWidth + "px";
        btn.style.top = Math.random() * window.innerHeight + "px";

        btn.onclick = forgive;

        document.body.appendChild(btn);
    }
}
</script>

</body>
</html>
